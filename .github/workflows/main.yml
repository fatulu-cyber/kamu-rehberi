name: Otomatik Kamu Rehberi Guncelleme
on:
  schedule:
    - cron: '0 4 * * *' # Her gun sabaha karsi 04:00'da calisir
  workflow_dispatch: # Manuel baslatma butonunu aktif eder

jobs:
  build-and-deploy:
    runs-level: ubuntu-latest
    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Kutuphaneleri Yukle
        run: |
          pip install -r gereksinimler.txt

      - name: Kaziyiciyi Calistir
        run: python kaziyici.py

      - name: Sayfayi Yukle
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Sitemizi Yayina Al
        uses: actions/deploy-pages@v4
